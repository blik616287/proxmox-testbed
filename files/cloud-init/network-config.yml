# Reference network config for cloud-init guests
# Actual network config is set via Proxmox API (ipconfig0 parameter)
network:
  version: 2
  ethernets:
    eth0:
      dhcp4: false
      addresses:
        - 10.100.0.101/24
      gateway4: 10.100.0.1
      nameservers:
        addresses:
          - 10.100.0.1
