---
- name: Wait for SSH to be available on Proxmox
  ansible.builtin.wait_for:
    host: "{{ proxmox_vm_ip }}"
    port: 22
    timeout: 300
  delegate_to: localhost

- name: Disable Proxmox enterprise repositories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/ceph.list

- name: Add Proxmox no-subscription repository
  ansible.builtin.copy:
    content: |
      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    mode: "0644"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Create admin API token
  ansible.builtin.shell: |
    set -e
    # Delete existing token if present, then recreate to get the secret
    pvesh delete /access/users/root@pam/token/{{ proxmox_api_token_id }} 2>/dev/null || true
    # Create token with full privileges (privsep=0)
    pvesh create /access/users/root@pam/token/{{ proxmox_api_token_id }} \
      --privsep 0 --output-format json
  args:
    executable: /bin/bash
  register: token_create_result
  changed_when: true

- name: Extract API token secret
  ansible.builtin.set_fact:
    api_token_secret: "{{ (token_create_result.stdout | from_json).value }}"
    api_token_full_id: "root@pam!{{ proxmox_api_token_id }}"

- name: Ensure cloud image directory exists
  ansible.builtin.file:
    path: /var/lib/vz/images
    state: directory
    mode: "0755"

- name: Download Ubuntu cloud image
  ansible.builtin.get_url:
    url: "{{ cloud_image_url }}"
    dest: "/var/lib/vz/images/{{ cloud_image_filename }}"
    mode: "0644"

- name: Check if cloud-init template already exists
  ansible.builtin.shell: qm status {{ template_vmid }} 2>/dev/null
  register: template_check
  changed_when: false
  failed_when: false

- name: Create cloud-init VM template
  when: template_check.rc != 0
  block:
    - name: Create VM for template
      ansible.builtin.command: >
        qm create {{ template_vmid }}
        --name {{ template_name }}
        --memory 2048
        --cores 2
        --net0 virtio,bridge=vmbr0
        --agent enabled=1
        --ostype l26

    - name: Import cloud image disk
      ansible.builtin.command: >
        qm importdisk {{ template_vmid }}
        /var/lib/vz/images/{{ cloud_image_filename }}
        local-lvm

    - name: Attach imported disk as scsi0
      ansible.builtin.command: >
        qm set {{ template_vmid }}
        --scsihw virtio-scsi-pci
        --scsi0 local-lvm:vm-{{ template_vmid }}-disk-0

    - name: Add cloud-init drive
      ansible.builtin.command: >
        qm set {{ template_vmid }}
        --ide2 local-lvm:cloudinit

    - name: Set boot order to scsi0
      ansible.builtin.command: >
        qm set {{ template_vmid }}
        --boot order=scsi0

    - name: Add serial console (for cloud-init)
      ansible.builtin.command: >
        qm set {{ template_vmid }}
        --serial0 socket
        --vga serial0

    - name: Convert VM to template
      ansible.builtin.command: qm template {{ template_vmid }}

- name: Verify template exists
  ansible.builtin.shell: qm status {{ template_vmid }}
  register: template_verify
  changed_when: false

- name: Print deployment summary
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "  Proxmox VE Testbed — Configuration Done"
      - "============================================"
      - ""
      - "Web UI:      https://{{ proxmox_vm_ip }}:8006"
      - "Node:        {{ proxmox_node }}"
      - "Root user:   root@pam / {{ proxmox_root_password }}"
      - ""
      - "API Token ID:     {{ api_token_full_id }}"
      - "API Token Secret: {{ api_token_secret }}"
      - ""
      - "Cloud-init template: {{ template_name }} (VMID {{ template_vmid }})"
      - "============================================"
