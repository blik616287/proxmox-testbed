---
- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ iso_cache_dir }}"
    - /tmp/pve-remaster
    - /tmp/pve-iso-mount
    - /var/log/proxmox-testbed

- name: Download Proxmox VE ISO
  ansible.builtin.get_url:
    url: "{{ proxmox_iso_url }}"
    dest: "{{ iso_cache_dir }}/{{ proxmox_iso_filename }}"
    mode: "0644"
    checksum: "{{ proxmox_iso_checksum }}"

# --- Remaster ISO with auto-installer answer baked in ---

- name: Check if remastered ISO already exists
  ansible.builtin.stat:
    path: "{{ iso_cache_dir }}/proxmox-ve-auto.iso"
  register: auto_iso_stat

- name: Remaster Proxmox ISO with auto-installer
  when: not auto_iso_stat.stat.exists
  block:
    - name: Mount original ISO
      ansible.posix.mount:
        path: /tmp/pve-iso-mount
        src: "{{ iso_cache_dir }}/{{ proxmox_iso_filename }}"
        fstype: iso9660
        opts: loop,ro
        state: ephemeral

    - name: Copy ISO contents to writable directory
      ansible.builtin.shell: |
        rsync -a /tmp/pve-iso-mount/ /tmp/pve-remaster/
        chmod -R u+w /tmp/pve-remaster/
      args:
        executable: /bin/bash

    - name: Unmount original ISO
      ansible.posix.mount:
        path: /tmp/pve-iso-mount
        state: unmounted

    - name: Render answer.toml into ISO tree
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/proxmox-answer.toml.j2"
        dest: /tmp/pve-remaster/answer.toml
        mode: "0644"

    - name: Create auto-installer-mode.toml (flat keys, not sections)
      ansible.builtin.copy:
        content: "mode = \"iso\"\n"
        dest: /tmp/pve-remaster/auto-installer-mode.toml
        mode: "0644"

    - name: Verify auto-installer-mode.toml content
      ansible.builtin.command: cat /tmp/pve-remaster/auto-installer-mode.toml
      register: mode_toml_check
      changed_when: false

    - name: Show auto-installer-mode.toml
      ansible.builtin.debug:
        var: mode_toml_check.stdout

    - name: Verify answer.toml content
      ansible.builtin.command: cat /tmp/pve-remaster/answer.toml
      register: answer_toml_check
      changed_when: false

    - name: Show answer.toml
      ansible.builtin.debug:
        var: answer_toml_check.stdout

    - name: Patch grub.cfg — set auto-installer as default with zero timeout
      ansible.builtin.replace:
        path: /tmp/pve-remaster/boot/grub/grub.cfg
        regexp: 'set timeout-style=menu\n\s+set timeout=10'
        replace: "set timeout-style=menu\n    set timeout=0\n    set default=0"

    - name: Extract MBR from original ISO for hybrid boot
      ansible.builtin.shell: |
        dd if={{ iso_cache_dir }}/{{ proxmox_iso_filename }} bs=512 count=1 of=/tmp/pve-remaster-mbr.bin 2>/dev/null
      args:
        executable: /bin/bash

    - name: Rebuild ISO with xorriso
      ansible.builtin.shell: |
        set -e
        cd /tmp/pve-remaster
        xorriso -as mkisofs \
          -o {{ iso_cache_dir }}/proxmox-ve-auto.iso \
          -r -V 'PVE' \
          -isohybrid-mbr /tmp/pve-remaster-mbr.bin \
          --protective-msdos-label \
          -b boot/grub/i386-pc/eltorito.img \
            -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info \
          -eltorito-alt-boot \
          -e efi.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
          .
      args:
        executable: /bin/bash

    - name: Verify remastered ISO has correct files
      ansible.builtin.shell: |
        set -e
        mkdir -p /tmp/pve-verify
        mount -o loop,ro {{ iso_cache_dir }}/proxmox-ve-auto.iso /tmp/pve-verify
        echo "=== auto-installer-mode.toml ==="
        cat /tmp/pve-verify/auto-installer-mode.toml
        echo "=== answer.toml ==="
        cat /tmp/pve-verify/answer.toml
        echo "=== grub auto-installer section ==="
        grep -A5 "auto-installer-mode.toml" /tmp/pve-verify/boot/grub/grub.cfg | head -10
        umount /tmp/pve-verify
      args:
        executable: /bin/bash
      register: iso_verify
      changed_when: false

    - name: Show ISO verification
      ansible.builtin.debug:
        var: iso_verify.stdout

    - name: Clean up remaster working files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/pve-remaster
        - /tmp/pve-remaster-mbr.bin
        - /tmp/pve-iso-mount
        - /tmp/pve-verify

# --- Create and boot VM with serial console logging ---

- name: Check if Proxmox VM already exists
  ansible.builtin.command: virsh dominfo {{ proxmox_vm_name }}
  register: vm_check
  changed_when: false
  failed_when: false

- name: Create Proxmox VM disk
  ansible.builtin.command: >
    qemu-img create -f qcow2
    {{ proxmox_vm_disk_path }}
    {{ proxmox_vm_disk_size }}
  args:
    creates: "{{ proxmox_vm_disk_path }}"
  when: vm_check.rc != 0

- name: Create and start Proxmox VM with serial console logging
  ansible.builtin.shell: |
    virt-install \
      --name {{ proxmox_vm_name }} \
      --ram {{ proxmox_vm_ram_mb }} \
      --vcpus {{ proxmox_vm_vcpus }} \
      --cpu host-passthrough \
      --disk path={{ proxmox_vm_disk_path }},bus=virtio,format=qcow2 \
      --cdrom {{ iso_cache_dir }}/proxmox-ve-auto.iso \
      --network network={{ libvirt_net_name }},mac={{ proxmox_vm_mac }},model=virtio \
      --os-variant debian12 \
      --graphics vnc,listen=127.0.0.1 \
      --serial file,path=/var/log/proxmox-testbed/console.log \
      --console pty,target.type=serial \
      --boot cdrom,hd \
      --noautoconsole
  args:
    executable: /bin/bash
  when: vm_check.rc != 0

- name: Tail serial console log during install (async monitoring)
  ansible.builtin.shell: |
    set -e
    echo "=== Monitoring serial console output ==="
    for i in $(seq 1 120); do
      state=$(virsh domstate {{ proxmox_vm_name }} 2>/dev/null || echo "unknown")
      if [ "$state" = "shut off" ]; then
        echo "=== VM shut off — installation complete ==="
        echo "=== Final serial log ==="
        cat /var/log/proxmox-testbed/console.log
        exit 0
      fi
      # Print any new serial output
      if [ -f /var/log/proxmox-testbed/console.log ]; then
        wc -c /var/log/proxmox-testbed/console.log
      fi
      sleep 30
    done
    echo "=== TIMEOUT — dumping full serial log ==="
    cat /var/log/proxmox-testbed/console.log
    exit 1
  args:
    executable: /bin/bash
  register: install_monitor
  changed_when: false
  when: vm_check.rc != 0
  timeout: 3600

- name: Show install monitor output
  ansible.builtin.debug:
    var: install_monitor.stdout_lines
  when: vm_check.rc != 0

- name: Dump full serial log on failure
  ansible.builtin.shell: cat /var/log/proxmox-testbed/console.log 2>/dev/null || echo "no log found"
  args:
    executable: /bin/bash
  register: serial_log
  changed_when: false
  when: install_monitor is defined and install_monitor.rc is defined and install_monitor.rc != 0

- name: Show serial log on failure
  ansible.builtin.debug:
    var: serial_log.stdout
  when: serial_log is defined and serial_log.stdout is defined
  failed_when: true

- name: Reconfigure VM boot order and start from disk
  ansible.builtin.shell: |
    set -e
    virt-xml {{ proxmox_vm_name }} --edit --boot hd,cdrom
    virsh start {{ proxmox_vm_name }}
  args:
    executable: /bin/bash
  when: vm_check.rc != 0

- name: Wait for Proxmox VM to be running
  ansible.builtin.command: virsh domstate {{ proxmox_vm_name }}
  register: vm_state
  until: vm_state.stdout.strip() == "running"
  retries: 30
  delay: 10
  changed_when: false

- name: Wait for Proxmox API to become available
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json/version"
    validate_certs: false
    status_code: 200
  register: api_check
  until: api_check.status == 200
  retries: 60
  delay: 10

- name: Proxmox VM is ready
  ansible.builtin.debug:
    msg: >
      Proxmox VE is running at https://{{ proxmox_api_host }}:{{ proxmox_api_port }}
      Serial log at /var/log/proxmox-testbed/console.log
