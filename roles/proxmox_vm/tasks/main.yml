---
- name: Ensure directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ iso_cache_dir }}"
    - /var/log/proxmox-testbed

- name: Download Proxmox VE ISO
  ansible.builtin.get_url:
    url: "{{ proxmox_iso_url }}"
    dest: "{{ iso_cache_dir }}/{{ proxmox_iso_filename }}"
    mode: "0644"
    checksum: "{{ proxmox_iso_checksum }}"

# --- Remaster ISO with auto-installer answer baked in ---

- name: Check if remastered ISO already exists
  ansible.builtin.stat:
    path: "{{ iso_cache_dir }}/proxmox-ve-auto.iso"
  register: auto_iso_stat

- name: Remaster Proxmox ISO with auto-installer
  when: not auto_iso_stat.stat.exists
  block:
    - name: Create temp directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/pve-remaster
        - /tmp/pve-iso-mount

    - name: Mount original ISO
      ansible.posix.mount:
        path: /tmp/pve-iso-mount
        src: "{{ iso_cache_dir }}/{{ proxmox_iso_filename }}"
        fstype: iso9660
        opts: loop,ro
        state: ephemeral

    - name: Copy ISO contents to writable directory
      ansible.builtin.shell: |
        rsync -a /tmp/pve-iso-mount/ /tmp/pve-remaster/
        chmod -R u+w /tmp/pve-remaster/
      args:
        executable: /bin/bash

    - name: Unmount original ISO
      ansible.posix.mount:
        path: /tmp/pve-iso-mount
        state: unmounted

    - name: Render answer.toml into ISO tree
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/proxmox-answer.toml.j2"
        dest: /tmp/pve-remaster/answer.toml
        mode: "0644"

    - name: Create auto-installer-mode.toml
      ansible.builtin.copy:
        content: "mode = \"iso\"\n"
        dest: /tmp/pve-remaster/auto-installer-mode.toml
        mode: "0644"

    - name: Patch grub.cfg for auto-boot with serial console
      ansible.builtin.shell: |
        set -e
        cd /tmp/pve-remaster/boot/grub
        sed -i 's/set timeout=10/set timeout=0/' grub.cfg
        sed -i 's|splash=silent proxmox-start-auto-installer|splash=verbose proxmox-start-auto-installer console=ttyS0,115200|' grub.cfg
        grep -A3 "Install Proxmox VE (Automated)" grub.cfg | head -5
      args:
        executable: /bin/bash
      register: grub_patch
      changed_when: true

    - name: Show patched grub entry
      ansible.builtin.debug:
        var: grub_patch.stdout

    - name: Extract MBR from original ISO
      ansible.builtin.shell: |
        dd if={{ iso_cache_dir }}/{{ proxmox_iso_filename }} bs=512 count=1 of=/tmp/pve-remaster-mbr.bin 2>/dev/null
      args:
        executable: /bin/bash

    - name: Rebuild ISO with xorriso
      ansible.builtin.shell: |
        set -e
        cd /tmp/pve-remaster
        xorriso -as mkisofs \
          -o {{ iso_cache_dir }}/proxmox-ve-auto.iso \
          -r -V 'PVE' \
          -isohybrid-mbr /tmp/pve-remaster-mbr.bin \
          --protective-msdos-label \
          -b boot/grub/i386-pc/eltorito.img \
            -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info \
          -eltorito-alt-boot \
          -e efi.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
          .
      args:
        executable: /bin/bash

    - name: Clean up remaster working files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/pve-remaster
        - /tmp/pve-remaster-mbr.bin
        - /tmp/pve-iso-mount

# --- Install Proxmox VM ---

- name: Check if Proxmox VM already exists
  ansible.builtin.command: virsh dominfo {{ proxmox_vm_name }}
  register: vm_check
  changed_when: false
  failed_when: false

- name: Install Proxmox VM
  when: vm_check.rc != 0
  block:
    - name: Create Proxmox VM disk
      ansible.builtin.command: >
        qemu-img create -f qcow2
        {{ proxmox_vm_disk_path }}
        {{ proxmox_vm_disk_size }}
      args:
        creates: "{{ proxmox_vm_disk_path }}"

    - name: Create and boot Proxmox VM from installer ISO
      ansible.builtin.shell: |
        truncate -s 0 /var/log/proxmox-testbed/console.log 2>/dev/null || true
        virt-install \
          --name {{ proxmox_vm_name }} \
          --ram {{ proxmox_vm_ram_mb }} \
          --vcpus {{ proxmox_vm_vcpus }} \
          --cpu host-passthrough \
          --disk path={{ proxmox_vm_disk_path }},bus=virtio,format=qcow2 \
          --cdrom {{ iso_cache_dir }}/proxmox-ve-auto.iso \
          --network network={{ libvirt_net_name }},mac={{ proxmox_vm_mac }},model=virtio \
          --os-variant debian12 \
          --graphics vnc,listen=127.0.0.1 \
          --serial file,path=/var/log/proxmox-testbed/console.log \
          --console pty,target.type=serial \
          --boot cdrom,hd \
          --noautoconsole
      args:
        executable: /bin/bash

    - name: Wait for installation to complete (monitor serial log)
      ansible.builtin.shell: |
        set -e
        for i in $(seq 1 120); do
          state=$(virsh domstate {{ proxmox_vm_name }} 2>/dev/null || echo "gone")
          if [ "$state" = "shut off" ] || [ "$state" = "gone" ]; then
            echo "Installation finished"
            # Check serial log for success
            if grep -q "Rebooting system after successful installation" /var/log/proxmox-testbed/console.log 2>/dev/null; then
              echo "SUCCESS: Auto-installer completed successfully"
              exit 0
            elif grep -q "make system bootable" /var/log/proxmox-testbed/console.log 2>/dev/null; then
              echo "SUCCESS: System made bootable"
              exit 0
            else
              echo "SERIAL LOG:"
              cat /var/log/proxmox-testbed/console.log
              echo "POSSIBLE FAILURE: Check serial log above"
              exit 1
            fi
          fi
          sleep 30
        done
        echo "TIMEOUT"
        cat /var/log/proxmox-testbed/console.log
        exit 1
      args:
        executable: /bin/bash
      register: install_result
      changed_when: false
      timeout: 3600

    - name: Show installation result
      ansible.builtin.debug:
        var: install_result.stdout_lines

    - name: Re-define and boot VM from disk (post-install)
      ansible.builtin.shell: |
        set -e
        # The VM may have been auto-undefined after install
        virsh undefine {{ proxmox_vm_name }} 2>/dev/null || true
        truncate -s 0 /var/log/proxmox-testbed/console.log 2>/dev/null || true
        virt-install \
          --name {{ proxmox_vm_name }} \
          --ram {{ proxmox_vm_ram_mb }} \
          --vcpus {{ proxmox_vm_vcpus }} \
          --cpu host-passthrough \
          --disk path={{ proxmox_vm_disk_path }},bus=virtio,format=qcow2 \
          --network network={{ libvirt_net_name }},mac={{ proxmox_vm_mac }},model=virtio \
          --os-variant debian12 \
          --graphics vnc,listen=127.0.0.1 \
          --serial file,path=/var/log/proxmox-testbed/console.log \
          --console pty,target.type=serial \
          --boot hd \
          --import \
          --noautoconsole
      args:
        executable: /bin/bash

# --- Wait for Proxmox to be ready ---

- name: Wait for Proxmox VM to be running
  ansible.builtin.command: virsh domstate {{ proxmox_vm_name }}
  register: vm_state
  until: vm_state.stdout.strip() == "running"
  retries: 30
  delay: 10
  changed_when: false

- name: Set VM to autostart
  ansible.builtin.command: virsh autostart {{ proxmox_vm_name }}
  changed_when: false

- name: Wait for Proxmox API to become available
  ansible.builtin.uri:
    url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json/access/ticket"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ proxmox_api_user }}"
      password: "{{ proxmox_root_password }}"
    validate_certs: false
    status_code: 200
  register: api_check
  until: api_check.status == 200
  retries: 60
  delay: 10

- name: Proxmox VM is ready
  ansible.builtin.debug:
    msg: >
      Proxmox VE is running at https://{{ proxmox_api_host }}:{{ proxmox_api_port }}
      Serial log: /var/log/proxmox-testbed/console.log
