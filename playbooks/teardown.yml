---
# Teardown — destroys the entire testbed
#
# Usage:
#   ansible-playbook playbooks/teardown.yml
#
# This will:
#   1. Destroy guest VMs via Proxmox API (if reachable)
#   2. Destroy the Proxmox VM via libvirt
#   3. Remove the libvirt network
#   4. Clean up temp files

- name: Destroy guest VMs via Proxmox API
  hosts: hypervisor
  tasks:
    - name: Check if Proxmox API is reachable
      ansible.builtin.uri:
        url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json"
        validate_certs: false
        timeout: 5
      register: api_reachable
      ignore_errors: true

    - name: Stop and destroy guest VMs
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_root_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ item.vmid }}"
        state: absent
        force: true
      loop: "{{ guest_vms }}"
      ignore_errors: true
      when: api_reachable is succeeded

    - name: Destroy cloud-init template
      community.proxmox.proxmox_kvm:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_root_password }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ template_vmid }}"
        state: absent
        force: true
      ignore_errors: true
      when: api_reachable is succeeded

- name: Destroy Proxmox VM and network
  hosts: hypervisor
  become: true
  tasks:
    - name: Destroy Proxmox VM
      ansible.builtin.shell: |
        virsh destroy {{ proxmox_vm_name }} 2>/dev/null || true
        virsh undefine {{ proxmox_vm_name }} --storage {{ proxmox_vm_disk_path }} 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: true

    - name: Destroy libvirt network
      ansible.builtin.shell: |
        virsh net-destroy {{ libvirt_net_name }} 2>/dev/null || true
        virsh net-undefine {{ libvirt_net_name }} 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: true

    - name: Clean up temp and log files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/pve-remaster
        - /tmp/pve-iso-mount
        - /tmp/pve-answer
        - /tmp/pve-answer.iso
        - /tmp/pve-remaster-mbr.bin
        - /var/log/proxmox-testbed

    - name: Teardown complete
      ansible.builtin.debug:
        msg: "Testbed destroyed. Run 'ansible-playbook playbooks/site.yml' to recreate."
